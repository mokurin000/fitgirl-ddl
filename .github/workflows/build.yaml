name: Build Releases
on:
  push:
    tags:
      - "*"
permissions:
  contents: write
jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Create Draft Release
        id: create-release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: false
          make_latest: true
          draft: true
  build-and-upload:
    name: Build and Upload for ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    env:
      RUST_BIN_NAME: "fitgirl-ddl{,_gui}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            suffix: ""
            dbginfo: "fitgirl-ddl{,_gui}.dSYM"
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: ""
            dbginfo: "fitgirl-ddl{,_gui}.dSYM"
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            suffix: .exe
            dbginfo: "fitgirl_ddl{,_gui}.pdb"
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            suffix: .exe
            dbginfo: "fitgirl_ddl{,_gui}.pdb"
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ matrix.target }}
          shared-key: "main"
      - name: Build binary
        uses: houseabsolute/actions-rust-cross@v0
        with:
          target: ${{ matrix.target }}
          args: "--locked --release"
          strip: true
      - name: Prepare assets
        shell: bash
        run: |
          target_dir=target/${{ matrix.target }}/release
          mv \
            ${target_dir}/${{ env.RUST_BIN_NAME }}${{ matrix.suffix }} \
            ${target_dir}/${{ matrix.dbginfo }} \
            .
          tar -chvzf ${{ matrix.target }}.tar.gz \
            LICENSE README.md \
            ${{ env.RUST_BIN_NAME }}${{ matrix.suffix }} \
            ${{ matrix.dbginfo }}
      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.target }}.tar.gz
          tag_name: ${{ github.ref_name }}
  publish-release:
    name: Publish Release
    needs:
      - create-release
      - build-and-upload
    runs-on: ubuntu-latest
    steps:
      - name: Publish Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
